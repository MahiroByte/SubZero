name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Stage 1: Kompilieren
  build:
    name: 🏗️ Build Stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Workloads
        run: dotnet workload restore

      - name: Restore NuGet Packages
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration Release --no-restore

  # Stage 2: Testen
  test:
    name: 🧪 Test Stage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Workloads
        run: dotnet workload restore

      - name: Restore NuGet Packages
        # Das hier hat im zweiten Job gefehlt!
        run: dotnet restore

      - name: Run Unit Tests
        # Wir entfernen --no-build, damit er die Tests im Notfall selbst baut, 
        # falls die DLLs nicht gefunden werden.
        run: |
          dotnet test SubZero.Domain.Tests/SubZero.Domain.Tests.csproj --configuration Release
          dotnet test SubZero.Application.Tests/SubZero.Application.Tests.csproj --configuration Release
          dotnet test SubZero.Infrastructure.Tests/SubZero.Infrastructure.Tests.csproj --configuration Release

  release:
    name: 📱 Android Build & Sign
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Workloads
        run: dotnet workload restore

      # Den Keystore aus dem Secret wieder in eine Datei umwandeln
      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > subzero.keystore

      - name: Build & Publish APK
        run: |
          dotnet publish SubZero.Presentation/SubZero.Presentation.csproj \
          -f net10.0-android \
          -c Release \
          -p:AndroidKeyStore=true \
          -p:AndroidSigningKeyStore=../subzero.keystore \
          -p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} \
          -p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} \
          -p:AndroidSigningStorePass=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SubZero-Signed-APK
          path: SubZero.Presentation/bin/Release/net10.0-android/*-Signed.apk
