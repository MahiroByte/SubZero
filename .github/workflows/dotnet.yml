name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Wir nutzen Ubuntu, da es schnell und günstig ist (für MAUI bräuchtest du macos-latest)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x # Da dein Log SDK 10.0.201 zeigt

    - name: Install MAUI Workload
      # Dieser Befehl liest dein Projekt/Solution und installiert fehlende Workloads (maui-android)
      run: dotnet workload restore

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      # Dieser Befehl sucht alle .csproj Dateien, die auf 'Tests' enden und testet sie einzeln
      run: |
        find . -name "*Tests.csproj" -exec dotnet test {} --no-build --verbosity normal --configuration Release \;
