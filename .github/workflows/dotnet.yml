name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Stage 1: Kompilieren
  build:
    name: 🏗️ Build Stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Workloads
        run: dotnet workload restore

      - name: Build Project
        # Wir bauen hier alles im Release-Modus
        run: dotnet build --configuration Release --no-restore

  # Stage 2: Testen (Erscheint als eigene Box)
  test:
    name: 🧪 Test Stage
    needs: build # Sorgt dafür, dass Test erst nach Build startet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Workloads
        run: dotnet workload restore

      - name: Run Unit Tests
        # Wir umgehen das SLNX-Pfad-Problem, indem wir die Projekte einzeln ansteuern
        run: |
          dotnet test SubZero.Domain.Tests/SubZero.Domain.Tests.csproj --configuration Release
          dotnet test SubZero.Application.Tests/SubZero.Application.Tests.csproj --configuration Release
          dotnet test SubZero.Infrastructure.Tests/SubZero.Infrastructure.Tests.csproj --configuration Release
